<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculatrice Colivex</title>

<style>
body {
  font-family: Arial;
  background: #f4f7fb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  color: #c40000;
}

h2 {
  color: #0b4ea2;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #c40000;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.secondary {
  background: #0b4ea2;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid black;
  padding: 8px;
}

th {
  background: #cceff1;
}

.results {
  margin-top: 20px;
  padding: 15px;
  border: 2px solid #ddd;
  border-radius: 10px;
}

.results div {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.total {
  font-size: 22px;
  color: #c40000;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Calculatrice Colivex</h1>

<div class="grid">
<input type="number" id="taux" value="165">
<input type="time" id="arrivee">
<input type="time" id="depart">
<input type="number" id="transport" value="1">
<input type="number" id="minimum" value="3">
<input type="number" id="depot" value="250">

<!-- NOUVEAU KM -->
<input type="number" id="km" placeholder="Nombre de km">
</div>

<h2>Matériel</h2>

<table id="table">
<thead>
<tr>
<th>Item</th>
<th>Prix</th>
<th>Qté</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

<br>
<button onclick="calcul()">Calculer</button>
<button class="secondary" onclick="reset()">Reset</button>

<div class="results">
<div><span>Main-d’œuvre</span><span id="main">0$</span></div>
<div><span>Matériel</span><span id="mat">0$</span></div>
<div><span>KM</span><span id="kmAff">0$</span></div>
<div><span>Sous-total</span><span id="sub">0$</span></div>
<div><span>TPS</span><span id="tps">0$</span></div>
<div><span>TVQ</span><span id="tvq">0$</span></div>
<div><span>Total</span><span id="tot">0$</span></div>
<div><span>Dépôt</span><span id="dep">0$</span></div>
<div class="total"><span>GRAND TOTAL</span><span id="grand">0$</span></div>
</div>

</div>

<script>

const items = [
{n:'Tape',p:2.5},
{n:'Housse matelas Queen',p:8},
{n:'Housse King',p:11},
{n:'Boite 2pc',p:2.75},
{n:'Boite 4pc',p:4.5},
{n:'Boite 5pc',p:5.5},
{n:'Boite vaisselle',p:7},
{n:'Garde-robe',p:18.5},
{n:'Papier bulles',p:8.5},
{n:'Papier 25lb',p:27.5},
{n:'Couverture',p:25}
];

function argent(v){
return v.toFixed(2)+' $';
}

function build(){
let t='';
items.forEach((i,x)=>{
t+=`
<tr>
<td>${i.n}</td>
<td>${argent(i.p)}</td>
<td><input type="number" id="q${x}" value="0" min="0"></td>
<td id="t${x}">0$</td>
</tr>`;
});
document.querySelector('#table tbody').innerHTML=t;
}

function heures(){
let a=document.getElementById('arrivee').value;
let d=document.getElementById('depart').value;
if(!a||!d)return 0;

let [h1,m1]=a.split(':');
let [h2,m2]=d.split(':');

let t1=+h1*60+ +m1;
let t2=+h2*60+ +m2;

if(t2<t1)t2+=1440;

return (t2-t1)/60;
}

function calcul(){

let taux=+taux.value;
let h=heures();

h=Math.ceil(h*4)/4;

let min=+minimum.value;
if(h<min)h=min;

let transport=+document.getElementById('transport').value;
let totalH=(h+transport)*taux;

let mat=0;

items.forEach((i,x)=>{
let q=+document.getElementById('q'+x).value;
let t=i.p*q;
mat+=t;
document.getElementById('t'+x).innerText=argent(t);
});


// KM AJOUT
let km=+document.getElementById('km').value || 0;
let totalKM = km * 0.75 * 2;


// TOTAL
let sub = totalH + mat + totalKM;

let tps = sub*0.05;
let tvq = sub*0.09975;

let total = sub + tps + tvq;

let depot = +document.getElementById('depot').value;

let grand = total - depot;


// OUTPUT
main.innerText=argent(totalH);
mat.innerText=argent(mat);
kmAff.innerText=argent(totalKM);
sub.innerText=argent(sub);
tps.innerText=argent(tps);
tvq.innerText=argent(tvq);
tot.innerText=argent(total);
dep.innerText='- '+argent(depot);
grand.innerText=argent(grand);

}

function reset(){
location.reload();
}

build();

</script>

</body>
</html
