<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice Colivex</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      color: #111;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #c40000;
      margin-top: 0;
      margin-bottom: 20px;
    }

    h2 {
      color: #0b4ea2;
      margin-top: 25px;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #0b4ea2;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
    }

    .btn-red {
      background: #c40000;
    }

    .btn-blue {
      background: #0b4ea2;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #000;
      padding: 8px;
    }

    th {
      background: #cceff1;
      text-align: center;
    }

    td.right {
      text-align: right;
    }

    td.center {
      text-align: center;
    }

    .qty-input {
      width: 80px;
      text-align: center;
      padding: 8px;
    }

    .results {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }

    .results div {
      display: flex;
      justify-content: space-between;
      margin: 7px 0;
      font-size: 18px;
    }

    .grand-total {
      font-size: 24px !important;
      color: #c40000;
      font-weight: bold;
      border-top: 2px solid #ccc;
      padding-top: 12px;
      margin-top: 12px;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 14px;
      }

      th, td {
        padding: 6px;
        font-size: 14px;
      }

      .results div {
        font-size: 16px;
      }

      .grand-total {
        font-size: 20px !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculatrice Colivex</h1>

    <div class="grid">
      <div class="field">
        <label for="tauxHoraire">Taux horaire ($)</label>
        <input type="number" id="tauxHoraire" value="165" step="0.01">
      </div>

      <div class="field">
        <label for="heureArrivee">Heure d’arrivée</label>
        <input type="time" id="heureArrivee">
      </div>

      <div class="field">
        <label for="heureDepart">Heure de départ</label>
        <input type="time" id="heureDepart">
      </div>

      <div class="field">
        <label for="fraisTransport">Frais transport (heures)</label>
        <input type="number" id="fraisTransport" value="1" step="0.25">
      </div>

      <div class="field">
        <label for="minimumHeures">Minimum heures</label>
        <input type="number" id="minimumHeures" value="3" step="0.25">
      </div>

      <div class="field">
        <label for="depot">Dépôt ($)</label>
        <input type="number" id="depot" value="250" step="0.01">
      </div>

      <div class="field">
        <label for="nbKm">Nombre de km</label>
        <input type="number" id="nbKm" value="0" step="0.01">
      </div>

      <div class="field">
        <label for="activerTaxes">Taxes</label>
        <select id="activerTaxes">
          <option value="oui" selected>Oui</option>
          <option value="non">Non</option>
        </select>
      </div>
    </div>

    <h2>Matériel</h2>

    <table id="tableMateriel">
      <thead>
        <tr>
          <th>Item</th>
          <th>Prix</th>
          <th>Qté</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="actions">
      <button class="btn-red" onclick="calculer()">Calculer</button>
      <button class="btn-blue" onclick="resetForm()">Reset</button>
    </div>

    <div class="results">
      <div><span>Main-d’œuvre</span><span id="mainOeuvre">0,00 $</span></div>
      <div><span>Matériel</span><span id="materielTotal">0,00 $</span></div>
      <div><span>KM</span><span id="kmTotal">0,00 $</span></div>
      <div><span>Sous-total</span><span id="sousTotal">0,00 $</span></div>
      <div><span>TPS</span><span id="tps">0,00 $</span></div>
      <div><span>TVQ</span><span id="tvq">0,00 $</span></div>
      <div><span>Total</span><span id="total">0,00 $</span></div>
      <div><span>Dépôt</span><span id="depotAffiche">0,00 $</span></div>
      <div class="grand-total"><span>GRAND TOTAL</span><span id="grandTotal">0,00 $</span></div>
    </div>
  </div>

  <script>
    const materiels = [
      { nom: 'Ruban plastique adhésif 2 pouces (TAPE)', prix: 2.50 },
      { nom: 'Housse (sac de plastique) à matelas 39" (simple)', prix: 6.00 },
      { nom: 'Housse (sac de plastique) à matelas 60" (queen)', prix: 8.00 },
      { nom: 'Housse (sac de plastique) à matelas 70" (king)', prix: 11.00 },
      { nom: 'Boîte 1,5 pieds cubes', prix: 2.25 },
      { nom: 'Boîte 2 pieds cubes (18 po X 15 po X 12-1/2 po)', prix: 2.75 },
      { nom: 'Boîte 4 pieds cubes (18 1/4 po X 18 1/4 po X 21 po)', prix: 4.50 },
      { nom: 'Boîte 5 pieds cubes (18 po X 18 po X 27 po)', prix: 5.50 },
      { nom: 'Boîte à vaisselle (18 po X 18 po X 28 po)', prix: 7.00 },
      { nom: 'Boîte abat-jour (22 po X 22 po X 18 po)', prix: 7.50 },
      { nom: 'Boîte garde-robes 24 po X 21 po X 40 po (inclus la barre)', prix: 18.50 },
      { nom: 'GARDE-ROBES NO CHARGE', prix: 0.00 },
      { nom: 'Boîte pour miroir / cadre (Inner) 41 po X 4 po X 30 po', prix: 7.50 },
      { nom: 'Boîte pour miroir / cadre (Outer) 42 po X 4 po X 34 po', prix: 8.50 },
      { nom: 'Rouleau papier bulles 1/2" x 48" (haut) x 5\' (longueur)', prix: 8.50 },
      { nom: 'Rouleau papier bulles 3,16" x 48" (haut) x 10\' (longueur)', prix: 8.50 },
      { nom: "Papier d'emballage 10 livres", prix: 15.00 },
      { nom: "Papier d'emballage 25 livres", prix: 27.50 },
      { nom: 'Couverture matelassé (70 po X 78 po)', prix: 25.00 },
      { nom: 'Couverture matelassé (usagée)', prix: 15.00 },
      { nom: 'Garde-Robes usagée', prix: 18.50 }
    ];

    function formatArgent(valeur) {
      return valeur.toLocaleString('fr-CA', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + ' $';
    }

    function arrondirQuartHeure(valeur) {
      return Math.ceil(valeur * 4) / 4;
    }

    function chargerMateriel() {
      const tbody = document.querySelector('#tableMateriel tbody');
      tbody.innerHTML = '';

      materiels.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.nom}</td>
          <td class="right">${formatArgent(item.prix)}</td>
          <td class="center">
            <input
              class="qty-input"
              type="number"
              min="0"
              step="1"
              value="0"
              id="qte-${index}"
              onchange="mettreAJourLigne(${index})"
            >
          </td>
          <td class="right" id="ligne-total-${index}">0,00 $</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function mettreAJourLigne(index) {
      const qte = parseFloat(document.getElementById(`qte-${index}`).value) || 0;
      const total = materiels[index].prix * qte;
      document.getElementById(`ligne-total-${index}`).textContent = formatArgent(total);
      calculer();
    }

    function calculerHeures() {
      const arrivee = document.getElementById('heureArrivee').value;
      const depart = document.getElementById('heureDepart').value;

      if (!arrivee || !depart) return 0;

      const [h1, m1] = arrivee.split(':').map(Number);
      const [h2, m2] = depart.split(':').map(Number);

      let debut = h1 * 60 + m1;
      let fin = h2 * 60 + m2;

      if (fin < debut) fin += 24 * 60;

      return (fin - debut) / 60;
    }

    function calculerMateriel() {
      let total = 0;

      materiels.forEach((item, index) => {
        const qte = parseFloat(document.getElementById(`qte-${index}`).value) || 0;
        total += item.prix * qte;
      });

      return total;
    }

    function calculer() {
      const tauxHoraire = parseFloat(document.getElementById('tauxHoraire').value) || 0;
      const fraisTransport = parseFloat(document.getElementById('fraisTransport').value) || 0;
      const minimumHeures = parseFloat(document.getElementById('minimumHeures').value) || 0;
      const depot = parseFloat(document.getElementById('depot').value) || 0;
      const nbKm = parseFloat(document.getElementById('nbKm').value) || 0;
      const taxesActives = document.getElementById('activerTaxes').value === 'oui';

      let heures = calculerHeures();
      heures = arrondirQuartHeure(heures);

      if (heures < minimumHeures) {
        heures = minimumHeures;
      }

      const totalMainOeuvre = (heures + fraisTransport) * tauxHoraire;
      const totalMateriel = calculerMateriel();
      const totalKm = (nbKm * 0.75) * 2;
      const sousTotal = totalMainOeuvre + totalMateriel + totalKm;

      let tps = 0;
      let tvq = 0;
      let total = sousTotal;

      if (taxesActives) {
        tps = sousTotal * 0.05;
        tvq = sousTotal * 0.09975;
        total = sousTotal + tps + tvq;
      }

      const grandTotal = Math.max(0, total - depot);

      document.getElementById('mainOeuvre').textContent = formatArgent(totalMainOeuvre);
      document.getElementById('materielTotal').textContent = formatArgent(totalMateriel);
      document.getElementById('kmTotal').textContent = formatArgent(totalKm);
      document.getElementById('sousTotal').textContent = formatArgent(sousTotal);
      document.getElementById('tps').textContent = formatArgent(tps);
      document.getElementById('tvq').textContent = formatArgent(tvq);
      document.getElementById('total').textContent = formatArgent(total);
      document.getElementById('depotAffiche').textContent = '- ' + formatArgent(depot);
      document.getElementById('grandTotal').textContent = formatArgent(grandTotal);
    }

    function resetForm() {
      document.getElementById('tauxHoraire').value = 165;
      document.getElementById('heureArrivee').value = '';
      document.getElementById('heureDepart').value = '';
      document.getElementById('fraisTransport').value = 1;
      document.getElementById('minimumHeures').value = 3;
      document.getElementById('depot').value = 250;
      document.getElementById('nbKm').value = 0;
      document.getElementById('activerTaxes').value = 'oui';

      materiels.forEach((_, index) => {
        document.getElementById(`qte-${index}`).value = 0;
        document.getElementById(`ligne-total-${index}`).textContent = '0,00 $';
      });

      calculer();
    }

    chargerMateriel();
    calculer();
  </script>
</body>
</html>
